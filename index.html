        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        function showInfoDesa(p) {
            var box = document.getElementById('infoDesa');
            var title = document.getElementById('infoTitle');
            if (!box) return;

            function getElVal(id, fallback) {
                var el = document.getElementById(id);
                return el ? el.value : fallback;
            }
            function clean(v) {
                if (v === null || typeof v === 'undefined' || v === '') return '-';
                return String(v).trim();
            }
            function normJenis(v) {
                return clean(v)
                    .replace(/BPSP/ig, 'BSPS')
                    .replace(/APBD\s*Kabupaten/ig, 'APBD Kab')
                    .replace(/APBD\s*Provinsi/ig, 'APBD Prov')
                    .replace(/^APBD Kab$/i, 'APBD Kabupaten')
                    .replace(/^APBD Prov$/i, 'APBD Provinsi');
            }
            function split(v) {
                return clean(v).split(',').map(function(x){ return x.trim(); }).filter(function(x){ return x && x !== '-'; });
            }
            function row(label, value) {
                return '<div class="info-row"><span>' + label + '</span><strong>' + clean(value) + '</strong></div>';
            }
            function getPropByContains(obj, keyword) {
                keyword = keyword.toLowerCase();
                for (var k in obj) {
                    if (Object.prototype.hasOwnProperty.call(obj, k) && k.toLowerCase().indexOf(keyword) !== -1) {
                        return obj[k];
                    }
                }
                return null;
            }
            function getCurrentFilters() {
                return {
                    tahun: getElVal('filterTahun', 'all'),
                    jenis: normJenis(getElVal('filterJenis', 'all'))
                };
            }
            function findRawRow(desa, kec) {
                try {
                    if (typeof dataDashboardAsli === 'undefined' || !dataDashboardAsli.rawDesa) return null;
                    desa = clean(desa).toLowerCase();
                    kec = clean(kec).toLowerCase();
                    return dataDashboardAsli.rawDesa.find(function(r){
                        return clean(r.Desa_Kelurahan).toLowerCase() === desa && clean(r.Kecamatan).toLowerCase() === kec;
                    }) || null;
                } catch (e) {
                    return null;
                }
            }
            function resolveInfo(prop) {
                var filters = getCurrentFilters();
                var desa = prop.Desa_Kelurahan || '-';
                var kec = prop.Kecamatan || '-';
                var raw = findRawRow(desa, kec) || {};

                var tahun = raw.Tahun_bantuan || prop.Tahun_bantuan || prop.Tahun_Menerima || getPropByContains(prop, 'jenis_bantuan') || '-';
                var jenis = raw.Jenis_Bantuan || prop.Jenis_Bantuan || prop['Tahun_2026 — Sheet1_Jenis_Bantuan'] || prop['Tahun_2025 — Sheet1_Jenis_Bantuan'] || prop['Tahun_2024 — Sheet1_Jenis_Bantuan'] || prop['Tahun_2023 — Sheet1_Jenis_Bantuan'] || '-';
                var jumlah = raw.Jumlah_Bantuan;

                if (filters.tahun !== 'all') tahun = filters.tahun;
                if (filters.jenis !== 'all') jenis = filters.jenis;

                var menerima = false;
                split(tahun).forEach(function(y){ if (/^20\d{2}$/.test(y)) menerima = true; });
                if (normJenis(jenis) !== '-' && normJenis(jenis).toLowerCase() !== 'belum pernah' && normJenis(jenis).toLowerCase() !== 'tidak menerima') menerima = true;

                if (filters.tahun !== 'all' && raw.Tahun_bantuan) {
                    menerima = split(raw.Tahun_bantuan).indexOf(filters.tahun) !== -1;
                }
                if (filters.jenis !== 'all' && raw.Jenis_Bantuan) {
                    menerima = split(raw.Jenis_Bantuan).map(normJenis).indexOf(filters.jenis) !== -1;
                }
                if (filters.tahun !== 'all' && filters.jenis !== 'all' && raw.Tahun_bantuan && raw.Jenis_Bantuan) {
                    menerima = split(raw.Tahun_bantuan).indexOf(filters.tahun) !== -1 && split(raw.Jenis_Bantuan).map(normJenis).indexOf(filters.jenis) !== -1;
                }

                var qgisCount = getPropByContains(prop, 'q2whide');
                qgisCount = Number(qgisCount || 0);

                if (filters.tahun !== 'all' && filters.jenis !== 'all') {
                    jumlah = menerima ? 1 : 0;
                } else if (filters.tahun !== 'all') {
                    jumlah = menerima ? 1 : 0;
                } else if (filters.jenis !== 'all') {
                    jumlah = qgisCount > 0 ? qgisCount : (menerima ? Number(raw.Jumlah_Bantuan || 1) : 0);
                } else if (typeof jumlah === 'undefined' || jumlah === null) {
                    jumlah = qgisCount;
                }

                return {
                    desa: desa,
                    kec: kec,
                    tahun: tahun,
                    jenis: normJenis(jenis),
                    jumlah: Number(jumlah || 0),
                    status: menerima ? 'Menerima Bantuan' : 'Tidak Menerima'
                };
            }

            var filters = getCurrentFilters();
            var info = resolveInfo(p || {});
            var html = '';
            html += row('Desa/Kelurahan', info.desa);
            html += row('Kecamatan', info.kec);
            html += row('Status Bantuan', info.status);
            if (filters.tahun === 'all') html += row('Tahun Bantuan', info.tahun);
            if (filters.jenis === 'all') html += row('Jenis Bantuan', info.jenis);
            html += row('Total Bantuan', info.jumlah + ' Kali');

            box.innerHTML = '<div class="desa-detail">' + html + '</div>';
            if (title) title.textContent = 'Informasi Desa';
        }
